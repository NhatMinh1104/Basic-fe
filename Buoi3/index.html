<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction: column;
        }
        *{
            color: black;
            margin: 0;
            padding: 0;
        }
        .box1 {
            background-color: red;
            width: 200px;
            height: 200px;
            padding: 10px 20px;
            border-style: solid;
            box-sizing: border-box;
        }
        .box2 {
            background-color: green;
            width: 200px;
            height: 200px;
        }
        .box3 {
            background-color: blue;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <p class = "box1">Hello, World!</p>
    <p class = "box2">This is a paragraph.</p>
    <p class = "box3">This is another paragraph.</p>
</body>
</html>
